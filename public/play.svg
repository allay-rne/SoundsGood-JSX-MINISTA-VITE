<svg xmlns="http://www.w3.org/2000/svg" width="470" height="470" viewBox="0 0 470 470" fill="none">
    <defs>
        <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <linearGradient id="glassStroke" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#A855F7" stop-opacity="1"/>
            <stop offset="50%" stop-color="#C084FC" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#8B5FBF" stop-opacity="0.7"/>
        </linearGradient>
    </defs>

    <path d="M70 235 L150 235 L180 150 L210 320 L240 235 L270 235 L295 205 L320 265 L345 235 L400 235"
          stroke="url(#glassStroke)"
          stroke-width="12"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-opacity="0.85"
          filter="url(#glassBlur)"/>
</svg>
