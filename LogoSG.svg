<svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 600 120"
        fill="none"
>
  <defs>
    <!-- Soft glow -->
    <filter id="pulseGlow" x="-50%" y="-50%" width="400%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pulse with glow -->
  <path
          d="

      M20 60
      L70 60
      L85 20
      L100 100
      L115 60
      L130 60
      L140 45
      L150 75
      L160 60
      L190 60
    "
          stroke="#8B5FBF"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#pulseGlow)"
  />

  <!-- Text -->
  <text
          x="210"
          y="75"
          fill="#ffffff"
          font-size="48"
          font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
          font-weight="500"
          letter-spacing="0.4px"
  >
    SoundsGood
  </text>
</svg>